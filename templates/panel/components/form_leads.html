<h3 class="text-lg font-bold text-purple-900 mb-1">Detalles del Lead</h3>
<p class="text-xs text-gray-600 mb-4">Área de edición y validación humana para los prospectos capturados automáticamente.</p>

<div id="leadFormVacio" class="p-8 border-2 border-dashed border-gray-300 rounded-lg text-center bg-gray-50 transition">
    <svg class="mx-auto h-10 w-10 text-gray-400 mb-2" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M15 15l-2 5L9 9l11 4-5 2zm0 0l5 5M7.188 2.239l.777 2.897M5.136 7.965l-2.898-.777M13.95 4.05l-2.122 2.122m-5.657 5.656l-2.12 2.122" />
    </svg>
    <span class="text-gray-400 text-xs font-medium block">Selecciona un prospecto de la lista de la derecha para habilitar los controles de edición y visto bueno.</span>
</div>

<form action="{% url 'panel_index' %}" method="POST" id="formLeadsActivo" class="hidden space-y-4 text-sm" onsubmit="deshabilitarBoton('submitLead', 'Guardando cambios...')">
    {% csrf_token %}
    <input type="hidden" name="action_type" value="actualizar_lead">
    <input type="hidden" name="lead_id" id="form_lead_id">
    
    <div>
        <label class="block text-xs font-bold uppercase text-gray-500 mb-1">Nombre Completo</label>
        <input type="text" name="nombre" id="form_lead_nombre" required class="w-full p-2.5 border border-gray-300 rounded-md shadow-sm focus:ring-purple-500 focus:border-purple-500">
    </div>

    <div class="grid grid-cols-2 gap-2">
        <div><label class="block text-xs font-bold uppercase text-gray-500 mb-1">Ciudad</label><input type="text" name="ciudad" id="form_lead_ciudad" class="w-full p-2.5 border border-gray-300 rounded-md shadow-sm"></div>
        <div><label class="block text-xs font-bold uppercase text-gray-500 mb-1">Estado</label><input type="text" name="estado" id="form_lead_estado" class="w-full p-2.5 border border-gray-300 rounded-md shadow-sm"></div>
    </div>

    <div class="grid grid-cols-3 gap-2">
        <div class="col-span-2"><label class="block text-xs font-bold uppercase text-gray-500 mb-1">Vehículo</label><input type="text" name="vehiculo" id="form_lead_vehiculo" class="w-full p-2.5 border border-gray-300 rounded-md shadow-sm" placeholder="Ej: Frontier"></div>
        <div><label class="block text-xs font-bold uppercase text-gray-500 mb-1">Año</label><input type="text" name="anio_vehiculo" id="form_lead_anio" class="w-full p-2.5 border border-gray-300 rounded-md shadow-sm" placeholder="2021"></div>
    </div>

    <div>
        <label class="block text-xs font-bold uppercase text-gray-400 mb-1">Refacción Solicitada (Solo Lectura)</label>
        <input type="text" id="form_lead_producto" readonly class="w-full p-2.5 border border-gray-200 rounded-md bg-gray-100 text-gray-500 cursor-not-allowed font-medium shadow-inner">
    </div>

    <div>
        <label class="block text-xs font-bold uppercase text-gray-500 mb-1">Dirección de Envío / Taller</label>
        <textarea name="direccion_envio" id="form_lead_direccion" rows="3" class="w-full p-2.5 border border-gray-300 rounded-md shadow-sm" placeholder="Dirección completa para cotizar flete..."></textarea>
    </div>

    <div id="contenedorEstatusAprobacion" class="p-3 rounded-md border flex items-center justify-between transition">
        <div>
            <span class="block text-[10px] font-bold uppercase tracking-wider text-gray-400">Control de Negocio</span>
            <span id="textoEstatusAprobacion" class="text-xs font-black tracking-tight"></span>
        </div>
        <div class="flex items-center">
            <input type="checkbox" name="aprobado_por_asesor" id="form_lead_aprobado" onchange="actualizarUIEstatus(this.checked)" class="w-4 h-4 text-purple-900 border-gray-300 rounded focus:ring-purple-500">
            <label for="form_lead_aprobado" class="ml-2 text-xs font-bold text-gray-700 select-none cursor-pointer">Visto Bueno</label>
        </div>
    </div>

    <div class="flex gap-2 pt-2 border-t border-gray-100">
        <button type="button" onclick="cancelarSeleccionLead()" class="w-1/3 bg-gray-100 hover:bg-gray-200 text-gray-600 font-medium py-2 rounded-md transition text-xs">Descartar</button>
        <button type="submit" id="submitLead" class="w-2/3 bg-purple-900 hover:bg-purple-800 text-white font-medium py-2 rounded-md shadow transition text-xs">Actualizar Registro</button>
    </div>
</form>
