<h3 id="panelHeaderProductos" class="text-lg font-bold text-blue-900 mb-2">Ingreso de Inventario</h3>
<p id="panelSubHeaderProductos" class="text-xs text-gray-600 mb-4">Selecciona el método de ingreso para actualizar el catálogo.</p>

<div id="mainProductFormTabs" class="flex bg-gray-100 p-1 rounded-md mb-6 text-sm">
    <button id="btnProsa" onclick="switchMetodo('prosa')" class="w-1/2 text-center py-2 rounded-md font-medium transition bg-blue-900 text-white shadow-sm">Ingreso por Texto (IA)</button>
    <button id="btnEstructurado" onclick="switchMetodo('estructurado')" class="w-1/2 text-center py-2 rounded-md font-medium transition text-gray-600 hover:text-gray-900">Ingreso por Campos</button>
</div>

<form action="{% url 'panel_index' %}" method="POST" id="formProsa" onsubmit="deshabilitarBoton('submitProsa', 'Procesando con IA...')">
    {% csrf_token %}
    <input type="hidden" name="action_type" value="prosa">
    <div class="mb-4">
        <label class="block text-xs font-bold uppercase text-gray-500 mb-1">Descripción del Catálogo</label>
        <textarea name="texto_masivo" rows="8" required placeholder="Ej: La batería LTH L-47-650..." class="w-full p-3 border border-gray-300 rounded-md shadow-sm focus:ring-blue-500 text-sm"></textarea>
    </div>
    <button type="submit" id="submitProsa" class="w-full bg-green-600 hover:bg-green-700 text-white font-medium py-2 px-4 rounded-md shadow">Procesar Ingreso con IA (n8n)</button>
</form>

<form action="{% url 'panel_index' %}" method="POST" id="formEstructurado" class="hidden space-y-4 text-sm" onsubmit="deshabilitarBoton('submitDirectoEstrucutrado', 'Guardando...')">
    {% csrf_token %}
    <input type="hidden" name="action_type" value="directo" id="formEstructuradoActionType">
    <input type="hidden" name="producto_id" value="" id="formEstructuradoProductoId">
    
    <div class="grid grid-cols-2 gap-2">
        <div><label class="block text-xs font-semibold text-gray-600">Marca</label><input type="text" name="marca" required id="form_marca" class="w-full p-2 border rounded-md" placeholder="LTH"></div>
        <div><label class="block text-xs font-semibold text-gray-600">Modelo</label><input type="text" name="modelo" required id="form_modelo" class="w-full p-2 border rounded-md" placeholder="L-47-650"></div>
    </div>
    <div class="grid grid-cols-3 gap-2">
        <div class="col-span-2"><label class="block text-xs font-semibold text-gray-600">Categoría</label><input type="text" name="categoria" required id="form_categoria" class="w-full p-2 border rounded-md" placeholder="Baterías"></div>
        <div><label class="block text-xs font-semibold text-gray-600">Stock</label><input type="number" name="stock" required id="form_stock" class="w-full p-2 border rounded-md" placeholder="8"></div>
    </div>
    <div class="grid grid-cols-2 gap-2">
        <div><label class="block text-xs font-semibold text-gray-600">Precio (MXN)</label><input type="number" name="precio" step="0.01" required id="form_precio" class="w-full p-2 border rounded-md" placeholder="2450"></div>
        <div><label class="block text-xs font-semibold text-gray-600">Ciudad</label><input type="text" name="ciudad" required id="form_ciudad" class="w-full p-2 border rounded-md" placeholder="Monterrey"></div>
    </div>
    <div><label class="block text-xs font-semibold text-gray-600">Estado</label><input type="text" name="estado" required id="form_estado" class="w-full p-2 border rounded-md" placeholder="Nuevo Leon"></div>

    <div class="border-t pt-2">
        <label class="block text-xs font-bold uppercase text-gray-500 mb-1">Compatibilidad General</label>
        <div id="compatibilidadContainerEstrucutrado" class="space-y-2">
            <div class="flex gap-2">
                <input type="text" name="compatibilidad" class="w-full p-2 border rounded-md" placeholder="Ej: Nissan Versa">
                <button type="button" onclick="agregarCompatibilidadEstrucutrado()" class="bg-gray-200 hover:bg-gray-300 px-3 rounded-md font-bold text-gray-700">+</button>
            </div>
        </div>
    </div>
    <div class="border-t pt-2">
        <label class="block text-xs font-bold uppercase text-gray-500 mb-1">Especificaciones (Clave-Valor)</label>
        <div id="especificacionesContainerEstrucutrado" class="space-y-2">
            <div class="flex gap-2">
                <input type="text" name="especificacion_llave" class="w-1/2 p-2 border rounded-md" placeholder="Clave">
                <input type="text" name="especificacion_valor" class="w-1/2 p-2 border rounded-md" placeholder="Valor">
                <button type="button" onclick="agregarEspecificacionEstrucutrado()" class="bg-gray-200 hover:bg-gray-300 px-3 rounded-md font-bold text-gray-700">+</button>
            </div>
        </div>
    </div>
    
    <div class="flex gap-2 pt-2 border-t border-gray-100">
        <button type="button" onclick="cancelarSeleccionProducto()" id="btnDescartarProducto" class="hidden w-1/3 bg-gray-100 hover:bg-gray-200 text-gray-600 font-medium py-2 rounded-md transition text-xs">Descartar</button>
        <button type="submit" id="submitDirectoEstrucutrado" class="w-full bg-blue-900 hover:bg-blue-800 text-white font-medium py-2 px-4 rounded-md shadow mt-2 transition-all duration-300">Guardar Directo en DB</button>
    </div>
</form>
