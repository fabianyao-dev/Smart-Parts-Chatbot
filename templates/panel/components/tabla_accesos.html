<div class="mb-6 flex flex-col md:flex-row md:justify-between md:items-center gap-4 border-b border-gray-100 pb-4">
    <div>
        <h2 class="text-xl font-bold text-gray-900">Lista Blanca de WhatsApp</h2>
        <p class="text-sm text-gray-500">Números autorizados para interactuar con la IA.</p>
    </div>
    <form method="POST" action="" class="flex gap-2 w-full md:w-auto">
        {% csrf_token %}
        <input type="hidden" name="action_type" value="agregar_numero">
        <input type="text" name="telefono" placeholder="Ej: 5218112345678" required 
               class="p-2 border border-gray-300 rounded-md text-sm w-full md:w-64">
        <button type="submit" class="bg-blue-900 text-white font-medium py-2 px-4 rounded-md text-sm hover:bg-blue-800">
            + Autorizar
        </button>
    </form>
</div>

<table class="w-full text-left">
    <thead>
        <tr class="bg-gray-50 text-sm text-gray-600 border-b">
            <th class="p-3">Número</th>
            <th class="p-3">Fecha</th>
            <th class="p-3 text-right">Acción</th>
        </tr>
    </thead>
    <tbody>
        {% for numero in numeros_autorizados %}
        <tr class="border-b hover:bg-gray-50">
            <td class="p-3 font-medium">{{ numero.telefono }}</td>
            <td class="p-3 text-sm text-gray-500">{{ numero.agregado_en|date:"d/m/Y H:i" }}</td>
            <td class="p-3 text-right">
                <form method="POST" onsubmit="return confirm('¿Seguro?');">
                    {% csrf_token %}
                    <input type="hidden" name="action_type" value="eliminar_numero">
                    <input type="hidden" name="numero_id" value="{{ numero.id }}">
                    <button type="submit" class="text-red-500 hover:text-red-700 text-sm font-medium">Revocar</button>
                </form>
            </td>
        </tr>
        {% endfor %}
    </tbody>
</table>
